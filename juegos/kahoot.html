<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kahoot Love ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <style>
        /* --- ESTILOS TIPO KAHOOT --- */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }

        body {
            background-color: #f2f2f2;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* PANTALLAS (Juego, Feedback, Final) */
        .screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            transition: opacity 0.3s;
        }
        .hidden { display: none !important; opacity: 0; }

        /* --- 1. PANTALLA DE JUEGO --- */
        #game-screen { background: #f2f2f2; padding-bottom: 20px; }

        /* Encabezado Pregunta */
        .question-header {
            background: white;
            width: 95%;
            padding: 20px;
            text-align: center;
            border-radius: 0 0 10px 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            margin-bottom: 10px;
            z-index: 10;
        }
        .question-header h2 { color: #333; font-size: 1.3rem; font-weight: 700; }

        /* Área de Imagen/Icono (Centro) */
        .media-area {
            flex-grow: 1;
            display: flex; align-items: center; justify-content: center;
            width: 100%;
            background: #46178f; /* Morado Kahoot */
            margin-bottom: 10px;
        }
        .timer-circle {
            width: 80px; height: 80px;
            background: rgba(0,0,0,0.3);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 2rem; font-weight: 900;
            border: 5px solid white;
        }

        /* Grilla de Respuestas */
        .answers-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            width: 98%;
            height: 250px; /* Altura fija para botones */
        }

        .answer-btn {
            border: none; outline: none;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            color: white; cursor: pointer;
            border-radius: 5px;
            box-shadow: 0 4px 0 rgba(0,0,0,0.2);
            transition: transform 0.1s;
            padding: 10px;
        }
        .answer-btn:active { transform: translateY(4px); box-shadow: none; }
        
        .answer-text { font-size: 1rem; font-weight: 700; text-align: center; margin-top: 5px; }
        .shape-icon { font-size: 1.5rem; margin-bottom: 5px; }

        /* Colores Kahoot Oficiales */
        .red { background-color: #e21b3c; }
        .blue { background-color: #1368ce; }
        .yellow { background-color: #d89e00; }
        .green { background-color: #26890c; }

        /* --- 2. PANTALLA DE FEEDBACK (Intermedia) --- */
        #feedback-screen { color: white; text-align: center; }
        .bg-correct { background-color: #66bf39; }
        .bg-wrong { background-color: #ff3355; }
        
        .feedback-msg { font-size: 2.5rem; font-weight: 900; margin-bottom: 20px; }
        .score-box { background: rgba(0,0,0,0.2); padding: 10px 30px; border-radius: 20px; font-size: 1.5rem; }
        .btn-next {
            margin-top: 30px;
            background: white; color: #333;
            border: none; padding: 15px 40px;
            font-size: 1.2rem; font-weight: 800;
            border-radius: 5px; cursor: pointer;
            box-shadow: 0 5px 0 #ccc;
        }

        /* --- 3. PANTALLA FINAL (Podio) --- */
        #end-screen { background: #46178f; color: white; text-align: center; }
        .podium-box { margin-bottom: 30px; animation: bounceInUp 1s; }
        .final-score { font-size: 3rem; font-weight: 900; color: #ffeb3b; text-shadow: 2px 2px 0 #000; }
        
        .btn-lobby {
            background: #e21b3c; color: white;
            text-decoration: none; padding: 15px 30px;
            border-radius: 5px; font-weight: bold; font-size: 1.2rem;
            display: inline-block; margin-top: 20px;
            box-shadow: 0 5px 0 #890b20;
        }
    </style>
</head>
<body>

    <div id="game-screen" class="screen">
        <div class="question-header">
            <h2 id="q-text">Pregunta...</h2>
            <span style="font-size: 0.8rem; color: #666;" id="q-counter">1 de 10</span>
        </div>

        <div class="media-area">
            <div class="timer-circle" id="timer">20</div>
        </div>

        <div class="answers-grid">
            <button class="answer-btn red" onclick="checkAnswer(0)">
                <i class="fas fa-play shape-icon" style="transform: rotate(-90deg);"></i> <span class="answer-text" id="opt-0">Opción A</span>
            </button>
            <button class="answer-btn blue" onclick="checkAnswer(1)">
                <i class="fas fa-square shape-icon" style="transform: rotate(45deg);"></i> <span class="answer-text" id="opt-1">Opción B</span>
            </button>
            <button class="answer-btn yellow" onclick="checkAnswer(2)">
                <i class="fas fa-circle shape-icon"></i> <span class="answer-text" id="opt-2">Opción C</span>
            </button>
            <button class="answer-btn green" onclick="checkAnswer(3)">
                <i class="fas fa-square shape-icon"></i> <span class="answer-text" id="opt-3">Opción D</span>
            </button>
        </div>
    </div>

    <div id="feedback-screen" class="screen hidden">
        <h1 class="feedback-msg" id="fb-msg">¡Correcto!</h1>
        <div class="icon-large" style="font-size: 4rem; margin-bottom: 20px;">
            <i class="fas fa-check-circle" id="fb-icon"></i>
        </div>
        <div class="score-box">
            + <span id="points-added">0</span> puntos<br>
            Total: <span id="total-score">0</span>
        </div>
        <button class="btn-next" onclick="nextQuestion()">Siguiente</button>
    </div>

    <div id="end-screen" class="screen hidden">
        <div class="podium-box">
            <h1>🏆 PODIO DEL AMOR 🏆</h1>
            <p>Tu puntaje final:</p>
            <div class="final-score" id="final-score-display">0</div>
        </div>
        <p>¡Eres la experta número 1 en nosotros!</p>
        
        <a href="../lobby.html" class="btn-lobby">Volver al Menú</a>
    </div>

    <script>
        // --- BASE DE DATOS DE PREGUNTAS (10 PREGUNTAS) ---
        // IMPORTANTE: El 'correct' es el índice: 0=Rojo, 1=Azul, 2=Amarillo, 3=Verde
        const questions = [
            {
                q: "1️⃣ ¿Quién te ama más en todo el mundo?", 
                opts: ["Tu novio (Yo)", "El vecino", "Batman", "Nadie"],
                correct: 0 // Rojo
            },
            {
                q: "2️⃣ ¿Quién fue mi mejor amigo de infancia?",
                opts: ["Daniel", "Aldair", "Guillermo", "Paco"],
                correct: 0 // A) Daniel
            },
            {
                q: "3️⃣ ¿Cuál es mi mayor sueño?",
                opts: ["Viajar por el mundo", "Tener un hogar con vos", "Trabajar en la NASA", "Tener un Ferrari"],
                correct: 1 // B) Tener un hogar con vos
            },
            {
                q: "4️⃣ ¿Cuál es mi bebida favorita?",
                opts: ["Cifrut", "Coca Cola", "Inca Kola", "Sprite"],
                correct: 0 // A) Cifrut
            },
            {
                q: "5️⃣ ¿Cuándo nos vimos por segunda vez?",
                opts: ["15 de agosto", "16 de agosto", "17 de agosto", "11 de agosto"],
                correct: 1 // B) 16 de agosto
            },
            {
                q: "6️⃣ ¿Cuándo nos vimos por primera vez?",
                opts: ["9 de abril", "10 de abril", "11 de abril", "12 de abril"],
                correct: 0 // A) 9 de abril
            },
            {
                q: "7️⃣ ¿Cómo le pondría a nuestro hijo bebé?",
                opts: ["Manuel", "William", "Mike", "Juan"],
                correct: 1 // B) William
            },
            {
                q: "8️⃣ ¿Cuál es tu cuerpo favorito mío?",
                opts: ["Cintura", "Pelo", "Tetas", "Todo"],
                correct: 3 // D) Todo (Verde)
            },
            {
                q: "9️⃣ ¿Cuál es mi fetiche?",
                opts: ["Amarrada", "Juegos con los pies", "Sentones con falda", "En el auto"],
                correct: 2 // C) Sentones con falda (Amarillo)
            },
            {
                q: "🔟 ¿En qué curso era mejor en el colegio?",
                opts: ["Matemática", "Historia", "Inglés", "Ciencia"],
                correct: 1 // B) Historia
            }
        ];

        // VARIABLES DEL JUEGO
        let currentIdx = 0;
        let score = 0;
        let timeLeft = 20;
        let timerInterval;

        // ELEMENTOS DOM
        const gameScreen = document.getElementById('game-screen');
        const feedbackScreen = document.getElementById('feedback-screen');
        const endScreen = document.getElementById('end-screen');

        // INICIAR
        loadQuestion();

        function loadQuestion() {
            // Reset visuales
            gameScreen.classList.remove('hidden');
            feedbackScreen.classList.add('hidden');
            
            // Cargar datos
            const data = questions[currentIdx];
            document.getElementById('q-text').innerText = data.q;
            document.getElementById('q-counter').innerText = `${currentIdx + 1} de ${questions.length}`;

            // Botones
            for(let i=0; i<4; i++) {
                document.getElementById(`opt-${i}`).innerText = data.opts[i];
            }

            // Reiniciar Timer
            clearInterval(timerInterval);
            timeLeft = 20;
            document.getElementById('timer').innerText = timeLeft;
            timerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('timer').innerText = timeLeft;
                if(timeLeft <= 0) checkAnswer(-1); // Se acabó el tiempo
            }, 1000);
        }

        function checkAnswer(selected) {
            clearInterval(timerInterval);
            
            const correctIdx = questions[currentIdx].correct;
            let points = 0;
            let isCorrect = false;

            if(selected === correctIdx) {
                // CORRECTO: Puntos basados en velocidad (Max 1000)
                points = 600 + (timeLeft * 20); 
                score += points;
                isCorrect = true;
                showFeedback(true, points);
            } else {
                // INCORRECTO
                showFeedback(false, 0);
            }
        }

        function showFeedback(isCorrect, points) {
            gameScreen.classList.add('hidden');
            feedbackScreen.classList.remove('hidden');
            
            const bg = feedbackScreen;
            const msg = document.getElementById('fb-msg');
            const icon = document.getElementById('fb-icon');

            if(isCorrect) {
                bg.className = "screen bg-correct";
                msg.innerText = "¡Genial!";
                icon.className = "fas fa-check-circle";
                document.getElementById('points-added').innerText = points;
            } else {
                bg.className = "screen bg-wrong";
                msg.innerText = "¡Ups! 😢";
                icon.className = "fas fa-times-circle";
                document.getElementById('points-added').innerText = "0";
            }
            document.getElementById('total-score').innerText = score;
        }

        function nextQuestion() {
            currentIdx++;
            if(currentIdx < questions.length) {
                loadQuestion();
            } else {
                showEndScreen();
            }
        }

        function showEndScreen() {
            feedbackScreen.classList.add('hidden');
            endScreen.classList.remove('hidden');
            document.getElementById('final-score-display').innerText = score;
            
            // --- GUARDAR PROGRESO REAL ---
            localStorage.setItem('game_kahoot', 'true');
        }

    </script>
</body>
</html>
