<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingo Love & Spark ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(180deg, #ff9a9e 0%, #fad0c4 99%, #fad0c4 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #555;
        }

        h1 {
            font-family: 'Pacifico', cursive;
            color: #fff;
            text-shadow: 2px 2px 0 rgba(0,0,0,0.1);
            font-size: 2.8rem;
            margin-bottom: 5px;
            text-align: center;
        }

        p.subtitle { color: #fff; font-weight: bold; margin-bottom: 20px; text-align: center; }

        /* TARJETA BINGO */
        .bingo-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 20px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(255, 105, 135, 0.3);
            max-width: 420px;
            width: 100%;
            border: 4px solid #fff;
            position: relative;
        }

        /* GRID 4x4 */
        .bingo-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        .bingo-cell {
            aspect-ratio: 1;
            background: #fff0f0;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.2s;
            box-shadow: 0 4px 0 rgba(0,0,0,0.05);
            font-size: 1.5rem;
            color: #ff6b81;
            border: 1px solid #ffdde1;
        }

        .bingo-cell:hover { transform: translateY(-3px); background: #fff; }
        .bingo-cell:active { transform: scale(0.95); }

        /* ESTADO CUMPLIDO */
        .bingo-cell.marked {
            background: #ff6b81;
            color: white;
            animation: heartBeat 1s;
            border-color: #ff6b81;
        }

        /* MODAL DEL RETO */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(3px);
            display: none;
            align-items: center; justify-content: center;
            z-index: 50;
            padding: 20px;
        }

        .modal-card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            max-width: 350px;
            width: 100%;
            animation: zoomIn 0.3s;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            position: relative;
        }

        .modal-icon { font-size: 3.5rem; margin-bottom: 15px; display: block; }
        
        .modal-title { font-weight: 700; font-size: 1.4rem; margin-bottom: 10px; color: #ff6b81; font-family: 'Pacifico'; }
        
        .modal-desc { font-size: 1.1rem; margin-bottom: 25px; line-height: 1.5; color: #555; }

        .btn-action {
            background: linear-gradient(45deg, #ff9a9e, #ff6b81);
            color: white; border: none; padding: 12px 30px;
            border-radius: 50px; font-weight: bold; font-size: 1rem;
            cursor: pointer; width: 100%;
            box-shadow: 0 5px 15px rgba(255, 107, 129, 0.4);
            transition: 0.3s;
        }
        .btn-action:hover { transform: scale(1.05); }

        .btn-close {
            position: absolute; top: 10px; right: 15px;
            background: none; border: none; font-size: 1.5rem; cursor: pointer; color: #ccc;
        }

        /* PANTALLA FINAL */
        #win-screen {
            display: none;
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.98);
            z-index: 100;
            flex-direction: column; align-items: center; justify-content: center;
            text-align: center;
            padding: 20px;
        }

        .prize-box {
            background: #fff0f0; padding: 25px; border-radius: 20px;
            margin: 20px 0; border: 2px dashed #ff6b81;
            animation: pulse 2s infinite;
        }
    </style>
</head>
<body>

    <h1 class="animate__animated animate__fadeInDown">Bingo Love 💌</h1>
    <p class="subtitle animate__animated animate__fadeIn">Completa los retos para ganar</p>

    <div class="bingo-card animate__animated animate__zoomIn">
        <div class="bingo-grid" id="grid">
            </div>
    </div>

    <div class="modal-overlay" id="challenge-modal">
        <div class="modal-card">
            <button class="btn-close" onclick="closeModal()">×</button>
            <div class="modal-icon" id="m-icon">💖</div>
            <h3 class="modal-title" id="m-title">Reto de Amor</h3>
            <p class="modal-desc" id="m-desc">...</p>
            <button class="btn-action" onclick="completeChallenge()">¡Misión Cumplida! ✅</button>
            <p style="font-size: 0.8rem; color: #aaa; margin-top: 15px;">(Espero la prueba en WhatsApp 😉)</p>
        </div>
    </div>

    <div id="win-screen">
        <h1 style="color: #ff6b81; font-size: 3rem;">¡GANASTE! 🎉</h1>
        <p style="font-size: 1.2rem; color: #555;">Eres la mejor novia del mundo.</p>
        
        <div class="prize-box">
            <h3 style="color: #ff6b81; margin-bottom: 10px;">🎁 TU PREMIO:</h3>
            <p style="font-size: 1.5rem; font-weight: bold; color: #2d3436;">
                Una Cita Perfecta <br> (Todo pagado)
            </p>
            <p style="font-size: 0.9rem; color: #888; margin-top:5px;">+ Un beso de película 🎬</p>
        </div>

        <a href="../lobby.html" class="btn-action" style="background: #ff7675; text-decoration: none; display: inline-block; width: auto;">
            Volver al Mapa
        </a>
    </div>

    <script>
        // --- 13 ROMÁNTICOS + 3 HOT ---
        const challenges = [
            // Fila 1
            { icon: "📷", type: "cute", text: "Mándame una selfie ahora mismo tirando un besito." },
            { icon: "🎵", type: "cute", text: "Dedícame una canción romántica y dime por qué te recuerda a mí." },
            { icon: "🫦", type: "hot",  text: "🔥 Mándame una foto de tu corpiño (o algo sexy que lleves puesto)." }, // HOT 1
            { icon: "📝", type: "cute", text: "Escribe 3 cosas que te encantan de nuestra relación." },
            
            // Fila 2
            { icon: "🤣", type: "cute", text: "Mándame un audio riéndote (amo tu risa)." },
            { icon: "🖼️", type: "cute", text: "Busca nuestra foto favorita y envíamela." },
            { icon: "🤝", type: "cute", text: "Enviame una foto tanga" },
            { icon: "🐸", type: "cute", text: "Mándame el sticker más tierno que tengas." },

            // Fila 3
            { icon: "😈", type: "hot",  text: "🔥 Dime qué parte de mi cuerpo te pone más nerviosa." }, // HOT 2
            { icon: "💌", type: "cute", text: "Escribe un mensaje diciendo cuánto me quieres." },
            { icon: "💍", type: "cute", text: "Si nos casáramos mañana, ¿dónde te gustaría que fuera?" },
            { icon: "🍬", type: "cute", text: "Dime qué apodo cariñoso te gusta más que te diga." },

            // Fila 4
            { icon: "💭", type: "cute", text: "Cuéntame un sueño bonito que quieras cumplir conmigo." },
            { icon: "🤫", type: "hot",  text: "🔥 Si estuviéramos solos ahora mismo... ¿qué me harías?" }, // HOT 3
            { icon: "🧸", type: "cute", text: "Mándame un abrazo virtual gigante (Gif o Sticker)." },
            { icon: "🎁", type: "cute", text: "Casilla Libre: Pídeme lo que quieras (un beso, un dulce, una foto)." }
        ];

        let markedCount = 0;
        let currentCellIndex = -1;
        const gridEl = document.getElementById('grid');
        const modalEl = document.getElementById('challenge-modal');

        // Generar Tablero
        challenges.forEach((ch, index) => {
            let cell = document.createElement('div');
            cell.className = 'bingo-cell';
            
            // Icono inicial: Si es Hot, ponemos fueguito, si no, corazón o regalo
            if(ch.type === 'hot') {
                cell.innerHTML = '🔥';
            } else {
                cell.innerHTML = index % 2 === 0 ? '❤️' : '🧸';
            }
            
            cell.onclick = () => openChallenge(index);
            cell.id = `cell-${index}`;
            gridEl.appendChild(cell);
        });

        function openChallenge(index) {
            if(document.getElementById(`cell-${index}`).classList.contains('marked')) return;

            currentCellIndex = index;
            const ch = challenges[index];
            
            document.getElementById('m-icon').innerText = ch.icon;
            document.getElementById('m-desc').innerText = ch.text;
            
            // Título diferente si es Hot
            if(ch.type === 'hot') {
                document.getElementById('m-title').innerText = "Reto Picante 🔥";
                document.getElementById('m-title').style.color = "#d63031";
            } else {
                document.getElementById('m-title').innerText = "Reto de Amor 💖";
                document.getElementById('m-title').style.color = "#ff6b81";
            }
            
            modalEl.style.display = 'flex';
        }

        function closeModal() { modalEl.style.display = 'none'; }

        function completeChallenge() {
            if(currentCellIndex > -1) {
                const cell = document.getElementById(`cell-${currentCellIndex}`);
                cell.classList.add('marked');
                cell.innerHTML = challenges[currentCellIndex].icon; // Muestra el icono real
                
                markedCount++;
                closeModal();

                // Confeti
                confetti({
                    particleCount: 50,
                    spread: 60,
                    origin: { y: 0.6 },
                    colors: ['#ff9a9e', '#ff6b81']
                });

                if(markedCount === challenges.length) {
                    setTimeout(winGame, 800);
                }
            }
        }

        function winGame() {
            document.getElementById('win-screen').style.display = 'flex';
            confetti({ particleCount: 300, spread: 200 });
            localStorage.setItem('game_bingo', 'true');
        }

    </script>
</body>
</html>
