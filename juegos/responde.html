<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ecos del Corazón 💖</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(135deg, #fff0f0 0%, #ffe9e9 100%);
            min-height: 100vh;
            padding: 20px;
            color: #555;
        }

        /* ENCABEZADO */
        header { text-align: center; margin-bottom: 30px; }
        h1 {
            font-family: 'Dancing Script', cursive;
            color: #d63031;
            font-size: 3rem;
            margin-bottom: 5px;
        }
        p.subtitle { color: #ff7675; font-style: italic; }

        /* CONTENEDOR TIPO CARTA */
        .journal-container {
            max-width: 600px;
            margin: 0 auto;
            background: #fff;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border-top: 5px solid #ff7675;
            position: relative;
        }
        
        /* Decoración de papel */
        .journal-container::before {
            content: '';
            position: absolute; left: 30px; top: 0; bottom: 0;
            width: 2px; background: #ffeaa7; /* Línea de margen */
        }

        /* GRUPO DE PREGUNTAS */
        .question-group { margin-bottom: 30px; position: relative; padding-left: 20px; }
        
        label {
            display: block;
            font-weight: 700;
            color: #d63031;
            margin-bottom: 10px;
            font-size: 1.1rem;
        }

        textarea {
            width: 100%;
            border: none;
            border-bottom: 2px dashed #ccc;
            background: transparent;
            font-family: 'Quicksand', sans-serif;
            font-size: 1rem;
            color: #333;
            padding: 10px;
            resize: none;
            outline: none;
            transition: 0.3s;
            height: 60px; /* Altura inicial */
        }

        textarea:focus {
            border-bottom-color: #ff7675;
            background: #fff0f0;
        }

        /* SECCIONES */
        .section-title {
            text-align: center; margin: 40px 0 20px 0;
            color: #b2bec3; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 2px;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .section-title::before, .section-title::after {
            content: ''; height: 1px; background: #e0e0e0; flex-grow: 1;
        }

        /* BOTÓN ENVIAR */
        .btn-send {
            background: #d63031;
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            transition: transform 0.2s;
            margin-top: 20px;
            box-shadow: 0 5px 15px rgba(214, 48, 49, 0.3);
            text-decoration: none;
        }
        .btn-send:hover { transform: scale(1.02); background: #c0392b; }

        /* AREA FINAL (Oculta al principio) */
        #final-surprise {
            display: none;
            text-align: center;
            margin-top: 50px;
        }
        .final-btn {
            background: linear-gradient(45deg, #fd79a8, #e84393);
            color: white; padding: 20px 40px; border-radius: 50px;
            font-size: 1.5rem; text-decoration: none; font-weight: bold;
            box-shadow: 0 10px 25px rgba(232, 67, 147, 0.4);
            animation: pulse 2s infinite;
        }
    </style>
</head>
<body>

    <header class="animate__animated animate__fadeInDown">
        <h1>Ecos del Corazón ❤️</h1>
        <p class="subtitle">Sé sincera... todo queda entre tú y yo.</p>
    </header>

    <div class="journal-container animate__animated animate__fadeInUp" id="quiz-form">
        
        <div class="section-title"><span>El Comienzo</span></div>

        <div class="question-group">
            <label>1. ¿Qué fue lo primero que te gustó de mí?</label>
            <textarea id="q1" placeholder="Escribe aquí..."></textarea>
        </div>

        <div class="question-group">
            <label>2. ¿Cuándo empezaste a sentir algo más fuerte por mí?</label>
            <textarea id="q2" placeholder="Ese momento exacto..."></textarea>
        </div>

        <div class="question-group">
            <label>3. ¿Qué sentiste la primera vez que me viste en persona?</label>
            <textarea id="q3" placeholder="Tus pensamientos..."></textarea>
        </div>

        <div class="section-title"><span>Nosotros</span></div>

        <div class="question-group">
            <label>4. ¿Qué fue lo más romántico que hice sin saberlo?</label>
            <textarea id="q4"></textarea>
        </div>

        <div class="question-group">
            <label>5. ¿Qué palabra usarías para describir lo que soy para ti?</label>
            <textarea id="q5"></textarea>
        </div>

        <div class="question-group">
            <label>6. ¿Qué momento nuestro guardarías para siempre?</label>
            <textarea id="q6"></textarea>
        </div>

        <div class="question-group">
            <label>7. ¿Qué te da más miedo perder de nuestra relación?</label>
            <textarea id="q7"></textarea>
        </div>

        <div class="section-title" style="color: #d63031;"><span>Solo Tú y Yo 🔥</span></div>

        <div class="question-group">
            <label>8. ¿Algún deseo, pose o movimiento que deseas probar en la cama?</label>
            <textarea id="q8" placeholder=""></textarea>
        </div>

        <div class="question-group">
            <label>9. ¿Cuál parte de mi cuerpo te gusta más?</label>
            <textarea id="q9"></textarea>
        </div>

        <div class="question-group">
            <label>10. ¿Qué le dirías a mi "amiguito" si lo tuvieras al frente? 😈</label>
            <textarea id="q10"></textarea>
        </div>

        <div class="section-title"><span>Eternidad</span></div>

        <div class="question-group">
            <label>11. ¿Qué sueñas construir conmigo en el futuro?</label>
            <textarea id="q11"></textarea>
        </div>

        <div class="question-group">
            <label>12. ¿Cómo describirías nuestro amor en una frase?</label>
            <textarea id="q12"></textarea>
        </div>

        <button class="btn-send" onclick="sendToWhatsApp()">
            <i class="fab fa-whatsapp"></i> Enviar Respuestas 
        </button>

    </div>

    <div id="final-surprise" class="animate__animated animate__zoomIn">
        <h2 style="color: #d63031; font-family: 'Dancing Script'; font-size: 3rem; margin-bottom: 20px;">
            Gracias por abrir tu corazón...
        </h2>
        <p style="margin-bottom: 30px; font-size: 1.2rem;">Ahora sí, tu verdadero regalo te espera.</p>
        
        <a href="regalo_final.html" class="final-btn">
            🎁 ABRIR SORPRESA FINAL
        </a>
    </div>

    <script>
        function sendToWhatsApp() {
            // 1. Recopilar respuestas
            let answers = "";
            const questions = [
                "1. Lo primero que le gustó:",
                "2. Cuando sintió algo fuerte:",
                "3. Primera vez en persona:",
                "4. Lo más romántico:",
                "5. Una palabra:",
                "6. Momento eterno:",
                "7. Miedo a perder:",
                "8. Deseo/Pose:",
                "9. Parte del cuerpo fav:",
                "10. Mensaje al amiguito:",
                "11. Sueño futuro:",
                "12. Frase de amor:"
            ];

            let filled = true;

            for (let i = 1; i <= 12; i++) {
                let val = document.getElementById('q' + i).value;
                if(val.trim() === "") filled = false;
                answers += `*${questions[i-1]}* ${val}%0A`;
            }

            if(!filled) {
                alert("¡Por favor responde todas, amor! No dejes espacios vacíos 🥺");
                return;
            }

            // 2. Crear Link de WhatsApp
            // REEMPLAZA "51999478740" CON TU NÚMERO REAL (Código país + número)
            const myNumber = "51999478740"; 
            const msg = `Hola mi amor, aquí están mis respuestas del Confesionario 💖:%0A%0A${answers}`;
            
            // 3. Abrir WhatsApp
            window.open(`https://wa.me/${myNumber}?text=${msg}`, '_blank');

            // 4. Mostrar Sorpresa Final y guardar progreso
            document.getElementById('quiz-form').style.display = 'none';
            document.getElementById('final-surprise').style.display = 'block';
            localStorage.setItem('game_responde', 'true');
        }
    </script>
</body>
</html>
