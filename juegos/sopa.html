<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Sopa de Amor ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            font-family: 'Quicksand', sans-serif;
            /* Fondo con patrón bonito */
            background-color: #ffdde1;
            background-image: radial-gradient(#ee9ca7 15%, transparent 16%), radial-gradient(#ee9ca7 15%, transparent 16%);
            background-size: 30px 30px;
            background-position: 0 0, 15px 15px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            user-select: none;
        }

        /* CONTENEDOR PRINCIPAL (Tipo Carta) */
        .game-container {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(255, 105, 135, 0.3);
            border: 4px solid #fff;
            max-width: 400px;
            width: 95%;
            text-align: center;
            position: relative;
        }

        /* Decoración de lazo (CSS puro) */
        .bow {
            position: absolute; top: -15px; left: 50%; transform: translateX(-50%);
            font-size: 3rem; color: #ff6b81;
            filter: drop-shadow(0 5px 5px rgba(0,0,0,0.1));
            z-index: 10;
        }

        h1 {
            font-family: 'Pacifico', cursive;
            color: #ff6b81;
            font-size: 2rem;
            margin-top: 20px;
            margin-bottom: 10px;
            text-shadow: 2px 2px 0 #fff;
        }

        /* LISTA DE PALABRAS (Estilo Etiquetas) */
        .word-list {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            margin-bottom: 15px;
        }

        .word-item {
            background: #ffeaa7;
            color: #d35400;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 0.8rem;
            font-weight: 800;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: 0.3s;
            border: 2px solid white;
        }
        
        .word-item.found {
            background: #55efc4;
            color: #008c68;
            text-decoration: line-through;
            transform: scale(0.9);
            opacity: 0.6;
        }

        /* GRILLA (Estilo Botones) */
        #game-board {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 4px;
            padding: 10px;
            background: #fff0f0;
            border-radius: 15px;
            border: 2px dashed #ff9a9e;
        }

        .cell {
            aspect-ratio: 1;
            background: white;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.9rem; /* Letra un poco más chica para que entre bien */
            color: #636e72;
            cursor: pointer;
            box-shadow: 0 2px 0 #ccc;
            transition: transform 0.1s;
        }

        .cell:active { transform: scale(0.9); }

        /* ESTADOS */
        .cell.selected {
            background: #ff7675;
            color: white;
            box-shadow: 0 2px 0 #d63031;
            animation: pulse 0.3s;
        }

        .cell.found {
            background: #00b894 !important;
            color: white !important;
            box-shadow: 0 2px 0 #008c68;
            animation: rubberBand 1s;
        }

        /* PANTALLA GANADORA */
        #win-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 20;
        }

        .btn-back {
            background: linear-gradient(45deg, #ff9a9e, #ff6b81);
            color: white; padding: 12px 30px; border-radius: 50px;
            text-decoration: none; font-weight: bold; margin-top: 15px;
            box-shadow: 0 5px 15px rgba(255, 107, 129, 0.4);
        }

    </style>
</head>
<body>

    <div class="game-container animate__animated animate__zoomIn">
        <div class="bow"><i class="fas fa-heart"></i></div>

        <h1>Sopa de Amor 💌</h1>
        <p style="font-size: 0.9rem; color: #888; margin-bottom: 10px;">Busca nuestras palabras especiales:</p>

        <div class="word-list" id="word-list"></div>
        
        <div id="game-board"></div>

        <div id="win-overlay">
            <h2 style="color: #ff6b81; font-family: 'Pacifico'; font-size: 2.5rem;">¡Completado! 🎉</h2>
            <p style="color: #555;">Eres la mejor buscadora.</p>
            <div style="font-size: 3rem; margin: 10px;">🧸❤️</div>
            <a href="../lobby.html" class="btn-back">Volver al Mapa</a>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN
        const words = ["AMOR", "BESITOS", "TEQUIERO", "MIVIDA", "CARIÑO", "ABRAZOS", "DESTINO", "MICIELO"];
        const gridSize = 10;
        let grid = [];
        let placedWords = [];
        let foundCount = 0;

        // ELEMENTOS
        const boardEl = document.getElementById('game-board');
        const listEl = document.getElementById('word-list');
        const winOverlay = document.getElementById('win-overlay');

        // INICIAR
        initGame();

        function initGame() {
            createEmptyGrid();
            placeWords();
            fillEmptySpaces();
            renderBoard();
            renderList();
        }

        function createEmptyGrid() {
            grid = [];
            for(let i=0; i<gridSize*gridSize; i++) {
                grid.push({ letter: '', index: i, selected: false, found: false });
            }
        }

        function placeWords() {
            words.forEach(word => {
                let placed = false;
                let attempts = 0;
                while(!placed && attempts < 100) {
                    const direction = Math.random() > 0.5 ? 'H' : 'V';
                    const startRow = Math.floor(Math.random() * gridSize);
                    const startCol = Math.floor(Math.random() * gridSize);
                    if(canPlace(word, startRow, startCol, direction)) {
                        doPlace(word, startRow, startCol, direction);
                        placed = true;
                    }
                    attempts++;
                }
            });
        }

        function canPlace(word, r, c, dir) {
            if(dir === 'H' && c + word.length > gridSize) return false;
            if(dir === 'V' && r + word.length > gridSize) return false;
            for(let i=0; i<word.length; i++) {
                let idx = dir === 'H' ? r * gridSize + (c + i) : (r + i) * gridSize + c;
                if(grid[idx].letter !== '' && grid[idx].letter !== word[i]) return false;
            }
            return true;
        }

        function doPlace(word, r, c, dir) {
            let indices = [];
            for(let i=0; i<word.length; i++) {
                let idx = dir === 'H' ? r * gridSize + (c + i) : (r + i) * gridSize + c;
                grid[idx].letter = word[i];
                indices.push(idx);
            }
            placedWords.push({ word: word, indices: indices, found: false });
        }

        function fillEmptySpaces() {
            const letters = "ABCDEFGHIJKLMNÑOPQRSTUVWXYZ";
            grid.forEach(cell => {
                if(cell.letter === '') cell.letter = letters[Math.floor(Math.random() * letters.length)];
            });
        }

        function renderBoard() {
            boardEl.innerHTML = '';
            grid.forEach((cell, i) => {
                const div = document.createElement('div');
                div.className = `cell ${cell.selected ? 'selected' : ''} ${cell.found ? 'found' : ''}`;
                div.innerText = cell.letter;
                
                // Eventos de selección
                div.onmousedown = () => toggleSelect(i);
                div.ontouchstart = (e) => { e.preventDefault(); toggleSelect(i); };
                
                boardEl.appendChild(div);
            });
        }

        function renderList() {
            listEl.innerHTML = '';
            words.forEach(w => {
                const isFound = placedWords.find(pw => pw.word === w && pw.found);
                const div = document.createElement('div');
                div.className = `word-item ${isFound ? 'found' : ''}`;
                div.innerText = w;
                listEl.appendChild(div);
            });
        }

        function toggleSelect(index) {
            if(grid[index].found) return;
            
            grid[index].selected = !grid[index].selected;
            renderBoard();
            checkWin();
        }

        function checkWin() {
            let newFind = false;
            placedWords.forEach(pw => {
                if(!pw.found) {
                    const allSelected = pw.indices.every(idx => grid[idx].selected);
                    if(allSelected) {
                        pw.found = true;
                        pw.indices.forEach(idx => {
                            grid[idx].found = true;
                            grid[idx].selected = false;
                        });
                        newFind = true;
                        foundCount++;
                        
                        // EFECTO CONFETI AL ENCONTRAR PALABRA
                        confetti({
                            particleCount: 50,
                            spread: 60,
                            origin: { y: 0.6 },
                            colors: ['#ff9a9e', '#a18cd1', '#fbc2eb']
                        });
                    }
                }
            });

            if(newFind) {
                renderBoard();
                renderList();
                if(foundCount === words.length) {
                    // VICTORIA TOTAL
                    setTimeout(() => {
                        localStorage.setItem('game_sopa', 'true');
                        winOverlay.style.display = 'flex';
                        confetti({ particleCount: 150, spread: 100 });
                    }, 800);
                }
            }
        }
    </script>
</body>
</html>
