<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Ti ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: 'Quicksand', sans-serif;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(180deg, #ffdde1 0%, #ee9ca7 100%);
    overflow: hidden;
}

/* Corazones */
.bg-heart {
    position: absolute;
    bottom: -100px;
    color: rgba(255, 255, 255, 0.6);
    animation: floatUp 10s linear infinite;
    font-size: 2rem;
}
@keyframes floatUp {
    0% { transform: translateY(0); opacity: 1; }
    100% { transform: translateY(-110vh); opacity: 0; }
}

.container {
    text-align: center;
    z-index: 10;
}

.box {
    background: rgba(255,255,255,0.9);
    padding: 50px 30px;
    border-radius: 40px;
    box-shadow: 0 20px 50px rgba(255,118,117,0.3);
}

h2 {
    font-family: 'Pacifico', cursive;
    color: #ff6b81;
    font-size: 2.5rem;
    margin-bottom: 10px;
}

p {
    color: #7f8fa6;
    margin-bottom: 25px;
}

/* BOTÓN */
button {
    padding: 15px 30px;
    border: none;
    border-radius: 50px;
    font-size: 1.2rem;
    font-family: 'Pacifico', cursive;
    cursor: pointer;
    background: linear-gradient(45deg, #ff9a9e, #fad0c4);
    color: white;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.1);
}
</style>
</head>

<body>

<div id="hearts-container"></div>

<div class="container">
    <div class="box">
        <h2>Hola Princesa 👑</h2>
        <p>Tengo algo especial para ti 💖</p>
        <button onclick="entrar()">Entrar 💌</button>
    </div>
</div>

<script>
// corazones
function createHeart() {
    const heart = document.createElement('div');
    heart.classList.add('bg-heart');
    heart.innerHTML = '❤️';
    heart.style.left = Math.random() * 100 + 'vw';
    heart.style.animationDuration = Math.random() * 3 + 5 + 's';
    heart.style.fontSize = Math.random() * 20 + 20 + 'px';
    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 8000);
}
setInterval(createHeart, 600);

// botón entrar
function entrar(){
    window.location.href = "mensaje.html";
}
</script>

</body>
</html>
